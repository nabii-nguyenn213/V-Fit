services:
  vfit-backend:
    build: .
    container_name: vfit-backend
    restart: unless-stopped
    init: true
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - uploads_data:/app/uploads
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  uploads_data:
