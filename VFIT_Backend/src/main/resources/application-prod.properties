server.forward-headers-strategy=framework
server.shutdown=graceful
server.compression.enabled=true
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

spring.lifecycle.timeout-per-shutdown-phase=30s
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

app.base-url=${APP_BASE_URL}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.bootstrap.admin-enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.full-name=${BOOTSTRAP_ADMIN_FULL_NAME:V-FIT Admin}
app.bootstrap.public-config-enabled=${BOOTSTRAP_PUBLIC_CONFIG_ENABLED:true}
app.bootstrap.sample-data-enabled=${BOOTSTRAP_SAMPLE_DATA_ENABLED:false}
app.redis.required=${REDIS_REQUIRED:true}
app.rate-limit.ai.fail-open=${AI_RATE_LIMIT_FAIL_OPEN:false}

jwt.secret=${JWT_SECRET}
app.security.otp-pepper=${OTP_PEPPER}

springdoc.api-docs.enabled=${OPENAPI_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_UI_ENABLED:false}

logging.level.root=INFO
logging.level.org.springframework.security=WARN
logging.level.org.mongodb.driver.cluster=WARN

management.endpoint.health.show-details=never
management.health.redis.enabled=${REDIS_HEALTH_ENABLED:${REDIS_REQUIRED:true}}
