server.port=${SERVER_PORT:8080}

spring.application.name=vfit-backend
# MongoDB Connection Options (Uncomment the one you need or set MONGODB_URI environment variable)
# Option A: 127.0.0.1 (IPv4 loopback - Recommended on Windows to avoid IPv6 SocketTimeoutException)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://vfit_app:vfit_app_dev_password@127.0.0.1:27017/vfit?authSource=vfit&maxPoolSize=100&minPoolSize=10&maxIdleTimeMS=60000&serverSelectionTimeoutMS=5000}
# Option B: localhost (Standard loopback)
# spring.data.mongodb.uri=${MONGODB_URI:mongodb://vfit_app:vfit_app_dev_password@localhost:27017/vfit?authSource=vfit&maxPoolSize=100&minPoolSize=10&maxIdleTimeMS=60000&serverSelectionTimeoutMS=5000}
# Option C: Local IP address (Change to your actual machine's local IP, e.g. 192.168.1.5, to connect from a physical mobile device or emulator)
# spring.data.mongodb.uri=${MONGODB_URI:mongodb://vfit_app:vfit_app_dev_password@192.168.1.100:27017/vfit?authSource=vfit&maxPoolSize=100&minPoolSize=10&maxIdleTimeMS=60000&serverSelectionTimeoutMS=5000}
# Option D: Docker Container DNS name (Use when running the backend inside docker-compose)
# spring.data.mongodb.uri=${MONGODB_URI:mongodb://vfit_app:vfit_app_dev_password@mongodb:27017/vfit?authSource=vfit&maxPoolSize=100&minPoolSize=10&maxIdleTimeMS=60000&serverSelectionTimeoutMS=5000}
spring.data.mongodb.auto-index-creation=true
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:60MB}
spring.servlet.multipart.file-size-threshold=${UPLOAD_FILE_SIZE_THRESHOLD:50MB}

app.name=${APP_NAME:V-FIT}
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.storage.upload-dir=${UPLOAD_DIR:uploads}
app.swagger.title=${SWAGGER_TITLE:V-FIT Backend API}
app.swagger.version=${SWAGGER_VERSION:v0.1.0}
app.swagger.description=${SWAGGER_DESCRIPTION:Modular monolith backend for V-FIT}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5175,http://localhost:5188,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5175,http://127.0.0.1:5188,http://localhost:8080}
app.bootstrap.admin-enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.public-config-enabled=${BOOTSTRAP_PUBLIC_CONFIG_ENABLED:true}
app.bootstrap.sample-data-enabled=${BOOTSTRAP_SAMPLE_DATA_ENABLED:true}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.full-name=${BOOTSTRAP_ADMIN_FULL_NAME:}
app.bootstrap.public-config.app-name=${BOOTSTRAP_APP_NAME:V-FIT}
app.bootstrap.public-config.slogan=${BOOTSTRAP_APP_SLOGAN:Train smarter, live healthier}
app.bootstrap.public-config.support-email=${BOOTSTRAP_SUPPORT_EMAIL:support@vfit.com}
app.bootstrap.public-config.terms-url=${BOOTSTRAP_TERMS_URL:https://vfit.com/terms}
app.bootstrap.public-config.privacy-url=${BOOTSTRAP_PRIVACY_URL:https://vfit.com/privacy}
app.bootstrap.public-config.latest-version=${BOOTSTRAP_LATEST_VERSION:1.0.0}
app.bootstrap.public-config.min-supported-version=${BOOTSTRAP_MIN_SUPPORTED_VERSION:1.0.0}
app.redis.required=${REDIS_REQUIRED:false}
app.exercise-library.cache-ttl-seconds=${EXERCISE_LIBRARY_CACHE_TTL_SECONDS:86400}
app.rate-limit.ai.max-requests=${AI_RATE_LIMIT_MAX_REQUESTS:60}
app.rate-limit.ai.window-seconds=${AI_RATE_LIMIT_WINDOW_SECONDS:60}
app.rate-limit.ai.fail-open=${AI_RATE_LIMIT_FAIL_OPEN:true}
app.rate-limit.ai.food-scan.max-daily-requests=${AI_FOOD_SCAN_MAX_DAILY_REQUESTS:10}
app.rate-limit.ai-ws.max-frames=${AI_WS_FRAME_RATE_MAX_FRAMES:${AI_RATE_LIMIT_MAX_REQUESTS:60}}
app.rate-limit.ai-ws.window-seconds=${AI_WS_FRAME_RATE_WINDOW_SECONDS:${AI_RATE_LIMIT_WINDOW_SECONDS:60}}
app.websocket.max-text-message-buffer-size=${WEBSOCKET_MAX_TEXT_MESSAGE_BUFFER_SIZE:10MB}
app.websocket.max-binary-message-buffer-size=${WEBSOCKET_MAX_BINARY_MESSAGE_BUFFER_SIZE:10MB}
app.websocket.ai-max-frame-size=${AI_WS_MAX_FRAME_SIZE:2MB}
app.websocket.async-send-timeout-ms=${WEBSOCKET_ASYNC_SEND_TIMEOUT_MS:10000}
app.websocket.max-session-idle-timeout-ms=${WEBSOCKET_MAX_SESSION_IDLE_TIMEOUT_MS:120000}
app.ai.client-mode=${AI_CLIENT_MODE:http}
app.ai.base-url=${AI_BASE_URL:http://localhost:5000}
app.ai.food-scanner-path=${AI_FOOD_SCANNER_PATH:/api/v1/food-scanner/}

jwt.secret=${JWT_SECRET:CHANGE_ME_TO_A_64_BYTE_SECRET_FOR_LOCAL_DEV_ONLY_CHANGE_ME_NOW}
jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.security.otp-pepper=${OTP_PEPPER:vfit_otp_secure_pepper_salt_secret_12345}
auth.social.google.client-id=${GOOGLE_CLIENT_ID:}
auth.social.facebook.app-id=${FACEBOOK_APP_ID:}
auth.social.facebook.app-secret=${FACEBOOK_APP_SECRET:}

springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=${OPENAPI_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_UI_ENABLED:true}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=${REDIS_HEALTH_ENABLED:${REDIS_REQUIRED:false}}

resilience4j.circuitbreaker.instances.aiCore.sliding-window-size=20
resilience4j.circuitbreaker.instances.aiCore.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.aiCore.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.aiCore.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.aiCore.minimum-number-of-calls=5

logging.level.org.springframework.security=INFO

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

sepay.webhook-secret=${SEPAY_WEBHOOK_SECRET:}
sepay.bank-code=${SEPAY_BANK_CODE:}
sepay.account-number=${SEPAY_ACCOUNT_NUMBER:}
sepay.account-name=${SEPAY_ACCOUNT_NAME:}
vietqr.base-url=${VIETQR_BASE_URL:https://img.vietqr.io/image}
payment.expiry-minutes=${PAYMENT_EXPIRY_MINUTES:15}
payment.expiry-scan-delay-ms=${PAYMENT_EXPIRY_SCAN_DELAY_MS:60000}
payment.voucher-expiry-scan-delay-ms=${PAYMENT_VOUCHER_EXPIRY_SCAN_DELAY_MS:60000}

# Spring Mail Configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
