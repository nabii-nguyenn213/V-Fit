name: vfit_frontend
description: V-FIT mobile frontend connected to the V-FIT Spring Boot backend.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  dio: ^5.7.0
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  hive_flutter: ^1.1.0
  url_launcher: ^6.3.1
  crypto: ^3.0.6
  firebase_crashlytics: ^4.2.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  jwt_decoder: ^2.0.1
  intl: ^0.19.0
  google_fonts: ^6.2.0
  image_picker: ^1.2.2
  flutter_svg: ^2.3.0
  xml: ^6.6.1
  path_drawing: ^1.0.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  freezed: ^2.5.7

flutter:
  uses-material-design: true
  assets:
    - assets/muscle_map/
    - assets/images/
