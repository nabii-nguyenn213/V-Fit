version: '3.8'

services:
  # Production API Service
  vfit-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vfit-api
    restart: always
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=${PORT:-5000}
      - "SECRET_KEY=${SECRET_KEY:?ERROR: SECRET_KEY must be set in production}"
      - "GEMINI_API_KEY=${GEMINI_API_KEY:?ERROR: GEMINI_API_KEY must be set in production}"
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - GEMINI_PROXY_URL=${GEMINI_PROXY_URL:-http://gemini-proxy:8082}
      - WEB2API_URL=${WEB2API_URL:-http://web2api:8085/v1/chat/completions}
      - USE_GEMINI_PROXY=${USE_GEMINI_PROXY:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=/app/logs/api.log
      - LOG_MAX_BYTES=${LOG_MAX_BYTES:-10485760}
      - LOG_BACKUP_COUNT=${LOG_BACKUP_COUNT:-5}
      - "CORS_ORIGINS=${CORS_ORIGINS:?ERROR: CORS_ORIGINS must be set in production}"
      - "DATABASE_URL=${DATABASE_URL:?ERROR: DATABASE_URL must be set in production (must be PostgreSQL)}"
      - MODEL_PATH_SHAPE=${MODEL_PATH_SHAPE:-/models/bmi_finetuned_model.pth}
      - MODEL_PATH_BODY_DETECT=${MODEL_PATH_BODY_DETECT:-/models/best.pt}
      - MODEL_PATH_REP_COUNTER=${MODEL_PATH_REP_COUNTER:-/models/phase_model.pt}
      - MAX_CONTENT_LENGTH=16777216
      - REQUEST_TIMEOUT=300
      - RETRY_ATTEMPTS=${RETRY_ATTEMPTS:-3}
      - RETRY_DELAY_SEC=${RETRY_DELAY_SEC:-2.0}
      - REQUEST_TIMEOUT_SEC=${REQUEST_TIMEOUT_SEC:-180.0}
    volumes:
      - vfit-logs:/app/logs
      - vfit-uploads:/app/uploads
      - vfit-models:/models
    networks:
      - vfit-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      gemini-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database (REQUIRED FOR PRODUCTION)
  db:
    image: postgres:15-alpine
    container_name: vfit-db
    restart: always
    environment:
      - "POSTGRES_USER=${DB_USER:?ERROR: DB_USER must be set}"
      - "POSTGRES_PASSWORD=${DB_PASSWORD:?ERROR: DB_PASSWORD must be set - use strong password}"
      - POSTGRES_DB=${DB_NAME:-vfit_db}
      - POSTGRES_INITDB_ARGS=${POSTGRES_INITDB_ARGS:--E UTF8 --locale=en_US.UTF-8}
    volumes:
      - vfit-db-data:/var/lib/postgresql/data
    networks:
      - vfit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-vfit_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vfit-redis
    restart: always
    command: "redis-server --requirepass ${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD must be set}"
    ports:
      - "6379:6379"
    volumes:
      - vfit-redis-data:/data
    networks:
      - vfit-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Gemini Proxy Service
  gemini-proxy:
    image: ghcr.io/davisondevel/gemini-web2api:latest
    container_name: vfit-gemini-proxy
    restart: always
    environment:
      - "GEMINI_API_KEY=${GEMINI_API_KEY:?ERROR: GEMINI_API_KEY must be set in production}"
    networks:
      - vfit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Recommendation API Service (FastAPI)
  vfit-recommendation-api:
    build:
      context: ./RecommendationSystem
      dockerfile: Dockerfile
    container_name: vfit-recommendation-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WEB2API_URL=http://vfit-gemini-proxy:8082/v1/chat/completions
      - GEMINI_MODEL=gemini-3.5-flash
      - GEMINI_PROXY_URL=http://vfit-gemini-proxy:8082
      - USE_GEMINI_PROXY=true
    networks:
      - vfit-network
    depends_on:
      - gemini-proxy

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: vfit-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - "${SSL_CERT_PATH:?ERROR: SSL_CERT_PATH must be set}:/etc/nginx/ssl/cert.pem:ro"
      - "${SSL_KEY_PATH:?ERROR: SSL_KEY_PATH must be set}:/etc/nginx/ssl/key.pem:ro"
      - vfit-logs:/var/log/nginx
    networks:
      - vfit-network
    depends_on:
      - vfit-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  vfit-db-data:
    driver: local
  vfit-redis-data:
    driver: local
  vfit-logs:
    driver: local
  vfit-uploads:
    driver: local
  vfit-models:
    driver: local

networks:
  vfit-network:
    driver: bridge
